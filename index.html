<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResSynth AI - UX Research Synthesis</title>
    <meta name="description" content="Multi-agent AI tool for UX researchers. Turn usability test recordings into structured insight reports." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'system-ui', '-apple-system', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: #f8fafc;
        color: #0f172a;
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Markdown styles */
      .markdown-body { color: #334155; line-height: 1.7; font-size: 0.9rem; }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        color: #0f172a; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.6em; letter-spacing: -0.02em;
      }
      .markdown-body h1 { font-size: 1.6em; }
      .markdown-body h2 { font-size: 1.3em; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.4em; }
      .markdown-body h3 { font-size: 1.1em; }
      
      .markdown-body table {
        width: 100%; border-collapse: separate; border-spacing: 0;
        margin: 1.25em 0; background: #fff; border: 1px solid #e2e8f0;
        border-radius: 10px; overflow: hidden; font-size: 0.85em;
        display: block; overflow-x: auto;
      }
      .markdown-body th {
        background: #f8fafc; padding: 10px 14px; text-align: left;
        border-bottom: 2px solid #e2e8f0; color: #475569;
        font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;
      }
      .markdown-body td {
        padding: 10px 14px; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: top;
      }
      .markdown-body tr:last-child td { border-bottom: none; }
      .markdown-body tr:hover td { background: #f8fafc; }
      
      .markdown-body blockquote {
        border-left: 3px solid #f97316; padding: 0.8rem 1rem;
        font-style: italic; color: #475569; background: #fff7ed;
        border-radius: 0 8px 8px 0; margin: 1.2em 0;
      }
      .markdown-body ul { list-style-type: disc; padding-left: 1.5em; margin: 0.8em 0; }
      .markdown-body ol { padding-left: 1.5em; margin: 0.8em 0; }
      .markdown-body li { margin-bottom: 0.4em; }
      .markdown-body strong { color: #0f172a; font-weight: 600; }
      .markdown-body hr { border: none; border-top: 1px solid #e2e8f0; margin: 1.5em 0; }
      .markdown-body code {
        background: #f1f5f9; padding: 0.15em 0.4em; border-radius: 4px;
        font-size: 0.85em; font-family: 'JetBrains Mono', monospace;
      }
      
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
